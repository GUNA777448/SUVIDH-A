services:
  postgres:
    image: postgres:16-alpine
    container_name: suvidha-postgres
    environment:
      POSTGRES_DB: suvidha_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - suvidha_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  auth-service:
    build:
      context: ./server/services/auth
      dockerfile: Dockerfile
    container_name: suvidha-auth-service
    env_file:
      - ./server/services/auth/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/suvidha_auth
      NODE_OPTIONS: --dns-result-order=ipv4first
    depends_on:
      - postgres
    ports:
      - "4009:4009"
    restart: unless-stopped

  payment-gateway-service:
    build:
      context: ./server/services/payment-gateway-service
      dockerfile: Dockerfile
    container_name: suvidha-payment-gateway-service
    environment:
      PAYMENT_GATEWAY_SERVICE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/suvidha_auth
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/suvidha_auth
      NODE_OPTIONS: --dns-result-order=ipv4first
    depends_on:
      - postgres
    ports:
      - "4005:4005"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "/"
        VITE_AUTH_API_PREFIX: "/api/v1/auth"
    container_name: suvidha-client
    depends_on:
      - auth-service
      - payment-gateway-service
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  suvidha_pg_data:
