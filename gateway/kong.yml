_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://host.docker.internal:4009
    routes:
      - name: auth-routes
        paths:
          - /api/v1/auth
        strip_path: false
        methods:
          - GET
          - POST
      - name: auth-health-routes
        paths:
          - /health
        strip_path: false
        methods:
          - GET

  - name: payment-gateway-service
    url: http://host.docker.internal:4005
    routes:
      - name: payment-routes
        paths:
          - /api/v1/payments
        strip_path: false
        methods:
          - GET
          - POST
          - PATCH
